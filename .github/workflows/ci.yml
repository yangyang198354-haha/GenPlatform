name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # Stage 1: Lint & Static Analysis
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff==0.4.9 bandit==1.7.9 safety==3.2.3

      - name: Ruff style check
        run: ruff check apps/ config/ core/
        continue-on-error: true

      - name: Bandit security scan
        run: bandit -r apps/ -ll
        continue-on-error: true

      - name: Safety CVE check
        run: safety scan -r requirements.txt
        continue-on-error: true

  # Stage 2: Backend Unit Tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run unit tests
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-fail-under=80 \
            -m "not integration and not e2e" \
            -x -q
        continue-on-error: true

      - uses: codecov/codecov-action@v4
        with:
          files: project_workspace/content_gen_platform/src/backend/coverage.xml
          flags: unit
        continue-on-error: true

  # Stage 3: Integration Tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb
        continue-on-error: true

      - name: Run integration tests
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-fail-under=90 \
            -m integration \
            -x -q
        continue-on-error: true

  # Stage 4: Frontend Build
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: project_workspace/content_gen_platform/src/frontend/dist/
          retention-days: 3

  # Stage 5: Docker Build & Push (main branch only)
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-integration, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase image names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=${{ env.REGISTRY }}/${REPO_LC}" >> $GITHUB_ENV

      - name: Mirror base images to GHCR (amd64, for Aliyun ECS servers behind GFW)
        run: |
          docker buildx imagetools create \
            --tag $IMAGE_BASE/pgvector:pg15 \
            pgvector/pgvector:pg15

          docker buildx imagetools create \
            --tag $IMAGE_BASE/redis:7-alpine \
            redis:7-alpine

          docker buildx imagetools create \
            --tag $IMAGE_BASE/nginx:1.25-alpine \
            nginx:1.25-alpine

      - name: Build & push backend image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: project_workspace/content_gen_platform/src/backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: project_workspace/content_gen_platform/src/frontend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 6: Deploy to Production (Aliyun ECS)
  deploy-production:
    name: Deploy to Production (Aliyun)
    runs-on: ubuntu-latest
    needs: docker-build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose & nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "project_workspace/content_gen_platform/src/docker-compose.yml,project_workspace/content_gen_platform/src/nginx"
          target: /opt/content-gen-platform
          strip_components: 3

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -e

            # Install Docker if not present
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            cd /opt/content-gen-platform

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo "ERROR: /opt/content-gen-platform/.env not found. Please create it from .env.example first." >&2
              exit 1
            fi

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            # Pull latest images & restart
            docker compose pull
            docker compose up -d --remove-orphans

            # Migrations run inside the backend startup command (migrate → gunicorn).
            # Poll for up to 2 minutes; print logs and fail if backend never starts.
            echo "Waiting for backend to start (runs DB migrations on startup)..."
            for i in $(seq 1 24); do
              CONTAINER_ID=$(docker compose ps -q backend 2>/dev/null || true)
              if [ -n "$CONTAINER_ID" ] && \
                 [ "$(docker inspect --format='{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null)" = "running" ]; then
                echo "Backend is running (${i}×5s elapsed)"
                break
              fi
              if [ "$i" = "24" ]; then
                echo "ERROR: backend did not start within 120s. Container logs:"
                docker compose logs --tail=100 backend
                exit 1
              fi
              echo "  not yet running... ($i/24)"
              sleep 5
            done

            # Smoke test — empty POST to login returns 400 with validation error keys
            curl -sf http://localhost/api/v1/auth/login/ \
              -X POST -H "Content-Type: application/json" \
              -d '{}' | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if 'non_field_errors' in d or 'email' in d else 1)"
            echo "Production deploy OK"
