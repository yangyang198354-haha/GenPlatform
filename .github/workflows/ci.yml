name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # Stage 1: Lint & Static Analysis
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff==0.4.9 bandit==1.7.9 safety==3.2.3

      - name: Ruff style check
        run: ruff check apps/ config/ core/
        continue-on-error: true

      - name: Bandit security scan
        run: bandit -r apps/ -ll
        continue-on-error: true

      - name: Safety CVE check
        run: safety check -r requirements.txt
        continue-on-error: true

  # Stage 2: Backend Unit Tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django pytest-cov

      - name: Run unit tests
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-fail-under=80 \
            -m "not integration and not e2e" \
            -x -q
        continue-on-error: true

      - uses: codecov/codecov-action@v4
        with:
          files: project_workspace/content_gen_platform/src/backend/coverage.xml
          flags: unit
        continue-on-error: true

  # Stage 3: Integration Tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django pytest-cov

      - name: Run migrations
        run: python manage.py migrate --run-syncdb
        continue-on-error: true

      - name: Run integration tests
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-fail-under=90 \
            -m integration \
            -x -q
        continue-on-error: true

  # Stage 4: Frontend Build
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: project_workspace/content_gen_platform/src/frontend/dist/
          retention-days: 3

  # Stage 5: Docker Build & Push (main branch only)
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-integration, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase image names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BACKEND=${{ env.REGISTRY }}/${REPO_LC}/backend" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=${{ env.REGISTRY }}/${REPO_LC}/frontend" >> $GITHUB_ENV

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: project_workspace/content_gen_platform/src/backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: project_workspace/content_gen_platform/src/frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 6: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: yangyang
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 57279
          script: |
            set -e
            cd /opt/content-gen-platform

            docker compose pull

            docker compose up -d --wait

            docker compose exec -T backend python manage.py migrate --check || \
            docker compose exec -T backend python manage.py migrate

            curl -sf http://localhost/api/v1/auth/login/ \
              -X POST -H "Content-Type: application/json" \
              -d '{}' | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if 'non_field_errors' in d or 'email' in d else 1)"

            echo "Staging deploy OK"
