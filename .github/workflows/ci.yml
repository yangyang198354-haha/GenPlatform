name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # Stage 1: Lint & Static Analysis
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff==0.4.9 bandit==1.7.9 safety==3.2.3

      - name: Ruff style check
        run: ruff check apps/ config/ core/
        continue-on-error: true

      - name: Bandit security scan
        run: bandit -r apps/ -ll --exit-zero
        continue-on-error: true

      - name: Safety CVE check
        run: safety scan -r requirements.txt
        continue-on-error: true

  # Stage 2: Backend Unit Tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # config.settings.test extends development with:
      #   CELERY_TASK_ALWAYS_EAGER=True, LocMemCache (no Redis), throttling disabled
      DJANGO_SETTINGS_MODULE: config.settings.test
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run unit tests
        # --cov-fail-under=80 is a hard gate: this step fails (and blocks the pipeline)
        # if branch coverage drops below 80%. continue-on-error is intentionally absent.
        run: |
          pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -m "not integration and not e2e" \
            -x -q

      - uses: codecov/codecov-action@v4
        with:
          files: project_workspace/content_gen_platform/src/backend/coverage.xml
          flags: unit
        continue-on-error: true  # Codecov upload failure must not block the pipeline

  # Stage 3: Integration Tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/backend
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project_workspace/content_gen_platform/src/backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run integration tests
        run: |
          pytest tests/ \
            --cov=apps \
            --cov-report=xml \
            -m integration \
            -v


  # Stage 4: Frontend Build
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: project_workspace/content_gen_platform/src/frontend/dist/
          retention-days: 3

  # Stage 5: Docker Build & Push (main branch only)
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-integration, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Set lowercase image names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=${{ env.REGISTRY }}/${REPO_LC}" >> $GITHUB_ENV

      - name: Mirror base images to GHCR (amd64, for Aliyun ECS servers behind GFW)
        run: |
          docker buildx imagetools create \
            --tag $IMAGE_BASE/pgvector:pg15 \
            pgvector/pgvector:pg15

          docker buildx imagetools create \
            --tag $IMAGE_BASE/redis:7-alpine \
            redis:7-alpine

          docker buildx imagetools create \
            --tag $IMAGE_BASE/nginx:1.25-alpine \
            nginx:1.25-alpine

      - name: Build & push backend image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: project_workspace/content_gen_platform/src/backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: project_workspace/content_gen_platform/src/frontend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 6: Validate production image before deploy
  # Catches boot failures, broken migrations, and import errors in CI
  # before they ever reach the production server.
  validate-image:
    name: Validate Production Image
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=${{ env.REGISTRY }}/${REPO_LC}" >> $GITHUB_ENV

      - name: Start test database (pgvector) and Redis
        run: |
          docker run -d --name validate-db \
            -p 5432:5432 \
            -e POSTGRES_DB=validate_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            pgvector/pgvector:pg15
          docker run -d --name validate-redis \
            -p 6379:6379 \
            redis:7-alpine
          # Wait for postgres
          for i in $(seq 1 20); do
            docker exec validate-db pg_isready -U postgres && break || sleep 2
          done

      - name: Django system check (verify all apps & settings load)
        run: |
          docker run --rm \
            --network host \
            -e DJANGO_SETTINGS_MODULE=config.settings.production \
            -e DJANGO_SECRET_KEY=ci-validate-not-for-production-xxxxxxxxxxxxx \
            -e ENCRYPTION_KEY=dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ= \
            -e POSTGRES_HOST=localhost \
            -e POSTGRES_DB=validate_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e ALLOWED_HOSTS=localhost \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e CORS_ALLOWED_ORIGINS=http://localhost \
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }} \
            python manage.py check

      - name: Verify all migrations apply cleanly
        run: |
          docker run --rm \
            --network host \
            -e DJANGO_SETTINGS_MODULE=config.settings.production \
            -e DJANGO_SECRET_KEY=ci-validate-not-for-production-xxxxxxxxxxxxx \
            -e ENCRYPTION_KEY=dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ= \
            -e POSTGRES_HOST=localhost \
            -e POSTGRES_DB=validate_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e ALLOWED_HOSTS=localhost \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e CORS_ALLOWED_ORIGINS=http://localhost \
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }} \
            python manage.py migrate

      - name: Verify gunicorn boots and serves HTTP
        run: |
          docker run -d --name validate-backend \
            --network host \
            -e DJANGO_SETTINGS_MODULE=config.settings.production \
            -e DJANGO_SECRET_KEY=ci-validate-not-for-production-xxxxxxxxxxxxx \
            -e ENCRYPTION_KEY=dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ= \
            -e POSTGRES_HOST=localhost \
            -e POSTGRES_DB=validate_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e ALLOWED_HOSTS=localhost \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e CORS_ALLOWED_ORIGINS=http://localhost \
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
          # Wait up to 60s for gunicorn to respond
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST -H "Content-Type: application/json" -d '{}' \
              http://localhost:8000/api/v1/auth/login/ 2>/dev/null || echo "000")
            case "$HTTP_CODE" in
              200|400|401|422)
                echo "Backend ready — HTTP $HTTP_CODE"
                exit 0
                ;;
            esac
            echo "  HTTP $HTTP_CODE, waiting... ($i/12)"
            sleep 5
          done
          echo "ERROR: Backend did not start within 60s. Logs:"
          docker logs validate-backend
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f validate-backend validate-db validate-redis 2>/dev/null || true

  # Stage 7: Deploy to Production (Aliyun ECS)
  deploy-production:
    name: Deploy to Production (Aliyun)
    runs-on: ubuntu-latest
    needs: validate-image
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Upload compose & nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "project_workspace/content_gen_platform/src/docker-compose.yml,project_workspace/content_gen_platform/src/nginx"
          target: /opt/content-gen-platform
          strip_components: 3

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          command_timeout: 90m
          script: |
            set -e

            # Install Docker if not present
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            # Configure Docker daemon to use NJU mirror for ghcr.io to speed up
            # pulls from Aliyun servers (ghcr.io direct can be very slow from China)
            if ! grep -q "ghcr.nju.edu.cn" /etc/docker/daemon.json 2>/dev/null; then
              echo "Configuring Docker registry mirror for ghcr.io..."
              echo '{"registry-mirrors":["https://ghcr.nju.edu.cn"]}' > /etc/docker/daemon.json
              systemctl reload docker || (systemctl restart docker && sleep 3)
              echo "Docker daemon reloaded with registry mirror."
            fi

            # Ensure deploy directory exists (first deploy)
            mkdir -p /opt/content-gen-platform
            cd /opt/content-gen-platform

            # Bootstrap .env on first deploy — generate secure random secrets
            if [ ! -f .env ]; then
              echo "INFO: .env not found, generating secure defaults for first deploy..."
              SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_urlsafe(50))")
              ENCRYPTION_KEY=$(python3 -c "import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
              printf 'DJANGO_SECRET_KEY=%s\nENCRYPTION_KEY=%s\nPOSTGRES_PASSWORD=postgres\nPOSTGRES_DB=content_gen_platform\nALLOWED_HOSTS=localhost,127.0.0.1,%s\nCORS_ALLOWED_ORIGINS=http://localhost\nSTORAGE_BACKEND=local\n' \
                "$SECRET_KEY" "$ENCRYPTION_KEY" "$HOSTNAME" > .env
              echo "INFO: .env created. Update ALLOWED_HOSTS and CORS_ALLOWED_ORIGINS with your domain."
            fi

            # Login to GHCR (also needed for authenticated pulls via mirror)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            # Free disk space: remove dangling images and stopped containers
            # before pulling new images (backend image includes PyTorch, ~2 GB)
            docker system prune -f

            # Pull latest images & restart
            docker compose pull
            docker compose up -d --remove-orphans

            # Remove images no longer referenced by any container (old versions)
            docker image prune -f

            # Wait for backend container to start (migrate runs inside startup command)
            echo "Waiting for backend container to start..."
            for i in $(seq 1 24); do
              CONTAINER_ID=$(docker compose ps -q backend 2>/dev/null || true)
              if [ -n "$CONTAINER_ID" ] && \
                 [ "$(docker inspect --format='{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null)" = "running" ]; then
                echo "  container running at step $i"
                break
              fi
              if [ "$i" = "24" ]; then
                echo "ERROR: backend container did not start within 120s. Logs:"
                docker compose logs --tail=100 backend
                exit 1
              fi
              echo "  not yet running... ($i/24)"
              sleep 5
            done

            # Wait for gunicorn to be ready (migrate runs before gunicorn starts)
            # 502 = nginx up but gunicorn not yet ready (keep waiting)
            # 200/400/401/422 = gunicorn is serving requests
            # Up to 60 x 5s = 5 minutes (first deploy migrate can take ~2 min)
            echo "Waiting for gunicorn to be ready..."
            for i in $(seq 1 60); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST -H "Content-Type: application/json" -d '{}' \
                http://localhost/api/v1/auth/login/ 2>/dev/null || echo "000")
              case "$HTTP_CODE" in
                200|400|401|422)
                  echo "  gunicorn ready — HTTP $HTTP_CODE"
                  break
                  ;;
                502|000)
                  # 502: nginx up, gunicorn not yet ready; 000: nginx not yet up
                  ;;
              esac
              if [ "$i" = "60" ]; then
                echo "ERROR: gunicorn not ready after 300s (last HTTP: $HTTP_CODE). Logs:"
                docker compose logs --tail=100 backend
                exit 1
              fi
              echo "  HTTP $HTTP_CODE, waiting... ($i/60)"
              sleep 5
            done
            echo "Production deploy OK"

            # Diagnostics: show celery worker startup logs to confirm model loads
            echo "--- Celery worker startup logs ---"
            docker compose logs --tail=50 celery_worker || true

  # Stage 8: Post-deploy Smoke Tests
  smoke-test:
    name: Post-deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    env:
      BASE_URL: http://${{ secrets.PROD_HOST }}
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x project_workspace/content_gen_platform/src/tests/smoke_test.sh
          project_workspace/content_gen_platform/src/tests/smoke_test.sh
        timeout-minutes: 5

  # Stage 9: E2E Tests (Playwright against production)
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: smoke-test
    defaults:
      run:
        working-directory: project_workspace/content_gen_platform/src/tests
    env:
      BASE_URL: http://${{ secrets.PROD_HOST }}
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: project_workspace/content_gen_platform/src/tests/playwright-report/
          retention-days: 7
