version: "3.9"

# All images are hosted on GHCR so staging server (behind GFW) can pull
# them without Docker Hub access. CI pipeline mirrors base images to GHCR.

services:
  db:
    image: ghcr.io/yangyang198354-haha/genplatform/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-content_gen_platform}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ghcr.io/yangyang198354-haha/genplatform/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/yangyang198354-haha/genplatform/backend:latest
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      POSTGRES_DB: ${POSTGRES_DB:-content_gen_platform}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # HuggingFace mirror — same as celery_worker so model downloads work
      # behind GFW.  Without this the web worker would try huggingface.co
      # (blocked), hang for minutes, and trigger a 504 Gateway Timeout.
      HF_ENDPOINT: https://hf-mirror.com
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
    volumes:
      - media_data:/app/media
      # Share the model cache with celery_worker so the embedding model
      # only needs to be downloaded once (by whichever service starts first).
      - model_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.asgi:application -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --timeout 120"
    expose:
      - "8000"

  celery_worker:
    image: ghcr.io/yangyang198354-haha/genplatform/backend:latest
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      POSTGRES_DB: ${POSTGRES_DB:-content_gen_platform}
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      # HuggingFace mirror for servers behind GFW (model download on first use)
      HF_ENDPOINT: https://hf-mirror.com
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
    volumes:
      - media_data:/app/media
      - model_cache:/root/.cache/huggingface
    depends_on:
      - backend
    command: celery -A config worker -l info -Q default,video,publish -c 2

  celery_beat:
    image: ghcr.io/yangyang198354-haha/genplatform/backend:latest
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      POSTGRES_DB: ${POSTGRES_DB:-content_gen_platform}
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    image: ghcr.io/yangyang198354-haha/genplatform/frontend:latest
    expose:
      - "80"

  nginx:
    image: ghcr.io/yangyang198354-haha/genplatform/nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  media_data:
  model_cache:
