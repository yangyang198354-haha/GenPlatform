[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
# Match any file named test_*.py anywhere in the tree (apps/ and tests/).
# Previously the pattern "tests/test_*.py" was listed alongside "test_*.py"
# which is redundant — the path prefix in a python_files glob has no effect
# on discovery root.  Keeping only "test_*.py" is cleaner and ensures pytest
# finds test files regardless of which subdirectory they live in when the
# caller specifies an explicit path on the command line (e.g. apps/ or tests/).
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q --strict-markers
markers =
    unit: pure unit tests, no DB
    integration: tests that hit the database and/or require the full Django+Celery stack
